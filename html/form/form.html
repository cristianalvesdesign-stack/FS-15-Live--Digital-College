<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usando a Tag FORM para criação de formulário em HTML</title>
</head>
<body>
    <form>
        <input type="text" name="user_name" placeholder="Digite seu nome">
        <input type="number" name="user_cpf" placeholder="Digite seu CPF" minlength="11" maxlength="11">
        <input type="password" name="user_password" placeholder="Digite sua senha">
        <input type="date" name="user_birthdate" placeholder="Digite sua data de nascimento">
        <input type="time" name="user_breakfast_hour" placeholder="Digite a hora">
        <input type="email" name="user_email" placeholder="Digite seu e-mail">
        <input type="file" name="user_resumer" placeholder="Anexar currículo">
        <div>
            <input type="checkbox" name="user_disabilities">
            <label for="user_disabilities">Precisa de auxilio para executar as atividades?</label>
        </div>
        <div>
            <label> Já trabalhou na empresa anteriormente?</label>
            <input type="radio" name="user_worker">
            <label for="user_worker">Sim</label>
            <input type="radio" name="user_worker">
            <label for="user_worker">Não</label>
        </div>
        <div>
            <select name="user_city">
                <option value="sao_paulo">São Paulo</option>
                <option value="rio_de_janeiro">Rio de Janeiro</option>
                <option value="belo_horizonte">Belo Horizonte</option>
                <option value="fortaleza">Fortaleza</option>
                <option value="porto_alegre">Porto Alegre</option>
            </select>
        </div>
        <div>
            <textarea name="user_mcover" ross="5"></textarea>
        </div>
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
