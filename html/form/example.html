<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de cadastro de usuário</title>
</head>
<body>
    <section>
        <h1>Cadastro de usuário</h1>
        <form>
            <div>
                <label for="user_name">Nome:</label><br>
                <input type="text" name="user_name">
            </div>
            <div>
                <label for="user_lastname">Sobrenome:</label><br>
                <input type="text" name="user_lastname">
            </div>
            <div>
                <label for="birthdate">Data de Nascimento:</label><br>
                <input type="date" name="birthdate">
            </div>
            <div>
                <label for="user_email">E-mail:</label><br>
                <input type="email" name="user_email">
            </div>
            <div>
                <label for="user_password">Senha:</label><br>
                <input type="password" name="user_password">
            </div>
            <div>
                <label for="user_password_confirm">Confirme a senha:</label><br>
                <input type="password" name="user_password_confirm">
            </div>
            <div>
                <label for="user_cpf">CPF:</label><br>
                <input type="text" name="user_cpf">
            </div>
            <div>
                <label for="user_phone">Telefone:</label><br>
                <input type="text" name="user_phone">
            </div>
            <div>
                <label for="user_address">Endereço:</label><br>
                <input type="text" name="user_address">
            </div>
            <div>
                <label for="user_city">Cidade:</label><br>
                <input type="text" name="user_city">
            </div>
            <div>
            <button type="submit" Style="background-color: #4CAF50; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; spacing: 10px;">Cadastrar</button>
            </div>
        </form>
    </section>
</body>
</html>
